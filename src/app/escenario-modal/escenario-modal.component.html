<ion-content class="modal-content">

  <div class="modal-header">
    <ion-icon name="close-outline" (click)="cerrar()"></ion-icon>
  </div>

  <div class="imagen">
    <img [src]="escenario.imagen">
  </div>

  <div class="info">
    <h2>{{escenario.nombre}}</h2>
    <p>{{escenario.descripcion}}</p>
  </div>

</ion-content>
