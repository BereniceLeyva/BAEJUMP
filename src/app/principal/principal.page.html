<ion-header class="ion-no-border">
  <ion-toolbar class="main-toolbar">
    <ion-title> <span>BAE</span> Technology</ion-title>
    
    <ion-buttons slot="end">
      <ion-avatar id="open-profile" class="header-avatar">
        <img [src]="fotoPerfil" alt="Avatar" />
      </ion-avatar>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <!-- 🔥 MODAL -->
  <ion-modal 
    trigger="open-profile" 
    [initialBreakpoint]="0.6"
    [breakpoints]="[0, 0.4, 0.6, 0.9]" 
    class="profile-modal">

    <ng-template>
      <div class="modal-body">

        <!-- 🔽 CONTENIDO SCROLLEABLE -->
        <div class="profile-container">
          <ion-avatar class="modal-avatar">
            <img [src]="fotoPerfil" alt="Avatar Detalle" />
          </ion-avatar>
          
          <div class="user-info">
            <h2>{{ user?.displayName || 'Usuario' }}</h2>
            <small>{{ user?.email }}</small>
          </div>
        </div>

        <!-- 🔥 BOTÓN FIJO ABAJO -->
        <div class="menu-card logout-action" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
          <div>
            <p>Cerrar Sesión</p>
            <small>Finalizar sesión actual</small>
          </div>
        </div>

      </div>
    </ng-template>
  </ion-modal>

  <!-- 🔽 TABS -->
  <ion-tabs>
    <ion-tab-bar slot="bottom" class="custom-tab-bar">
      <ion-tab-button tab="inicio">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Inicio</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="lore">
        <ion-icon name="book-outline"></ion-icon>
        <ion-label>Lore</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="rankings">
        <ion-icon name="trophy-outline"></ion-icon>
        <ion-label>Ranking</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="noticias">
        <ion-icon name="newspaper-outline"></ion-icon>
        <ion-label>Noticias</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="nosotros">
        <ion-icon name="people-outline"></ion-icon>
        <ion-label>Nosotros</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>

</ion-content>
